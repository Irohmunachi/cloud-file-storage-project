name: Azure Storage Automation

on:
  workflow_dispatch:

jobs:
  storage-job:
    runs-on: ubuntu-latest

    env:
      RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
      LOCATION: ${{ secrets.LOCATION }}
      STORAGE_ACCOUNT: ${{ secrets.STORAGE_ACCOUNT }}
      CONTAINER_NAME: ${{ secrets.CONTAINER_NAME }}
      LOG_FILE: logs/storage.log

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Prepare folders and config
        run: |
          mkdir -p logs downloads sample_files
          cat > config.env <<EOF
          RESOURCE_GROUP="${RESOURCE_GROUP}"
          LOCATION="${LOCATION}"
          STORAGE_ACCOUNT="${STORAGE_ACCOUNT}"
          CONTAINER_NAME="${CONTAINER_NAME}"
          LOG_FILE="${LOG_FILE}"
          EOF

      - name: Make scripts executable
        run: |
          chmod +x deploy.sh
          chmod +x file_manager.sh

      - name: Validate Azure login
        run: az account show

      - name: Ensure blob container exists
        run: |
          ACCOUNT_KEY=$(az storage account keys list \
            --resource-group "$RESOURCE_GROUP" \
            --account-name "$STORAGE_ACCOUNT" \
            --query "[0].value" \
            --output tsv)

          az storage container create \
            --name "$CONTAINER_NAME" \
            --account-name "$STORAGE_ACCOUNT" \
            --account-key "$ACCOUNT_KEY" \
            --public-access blob

      - name: Upload test file
        run: bash file_manager.sh upload sample_files/testfile.txt

      - name: List files
        run: bash file_manager.sh list

      - name: Download test file
        run: bash file_manager.sh download testfile.txt

      - name: Delete test file
        run: bash file_manager.sh delete testfile.txt

      - name: Final list
        run: bash file_manager.sh list

      - name: Show logs
        run: cat logs/storage.log